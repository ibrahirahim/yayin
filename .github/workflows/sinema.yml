name: SSH101.com Yayın

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Her 6 saatte bir yeniden başlat

jobs:
  yayin:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: 📥 Depoyu klonla
      uses: actions/checkout@v4

    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Bağımlılıkları yükle
      run: |
        pip install requests

    - name: 📦 FFmpeg kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 🎬 Yayın scriptini oluştur
      run: |
        cat > yayin.py << 'EOF'
        [YUKARIDAKİ PYTHON KODUNUN TAMAMI]
        EOF

    - name: 🚀 Yayını başlat
      run: |
        echo "========================================"
        echo "🎬 SSH101.com Yayını Başlatılıyor"
        echo "========================================"
        python yayin.py
