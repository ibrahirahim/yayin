name: SSH101.com Yayın

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  yayin:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Depoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 FFmpeg kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🎬 Yayın scriptini oluştur
        run: |
          cat > yayin.py << 'EOF'
          import subprocess
          import time

          # ===================== SSH101.com AYARLARI =====================
          RTMP_URL = "rtmp://ssh101.bozztv.com:1935/ssh101"
          STREAM_KEY = "filgo"
          rtmp_server = f"{RTMP_URL}/{STREAM_KEY}"

          # ===================== YAYIN AYARLARI =====================
          VIDEO_URL = "https://catcast.ismailturret.workers.dev/50732.m3u8"
          LOGO_URL = "https://i.hizliresim.com/q99vnmk.png"

          print("=" * 50)
          print("📺 SSH101.com Yayın Başlatılıyor")
          print("=" * 50)
          print(f"🎬 Video: {VIDEO_URL}")
          print(f"🎨 Logo: {LOGO_URL}")
          print(f"🔑 Stream Key: {STREAM_KEY}")
          print(f"📡 RTMP: {rtmp_server}")
          print("=" * 50)

          command = [
              "ffmpeg",
              "-re",
              "-stream_loop", "-1",
              "-i", VIDEO_URL,
              "-i", LOGO_URL,
              "-filter_complex",
              "[0:v]scale=1280:720:force_original_aspect_ratio=decrease,"
              "pad=1280:720:(ow-iw)/2:(oh-ih)/2:black[v0];"
              "[1:v]scale=-1:110[logo];"
              "[v0][logo]overlay=10:10[v]",
              "-map", "[v]",
              "-map", "0:a?",
              "-c:v", "libx264",
              "-preset", "veryfast",
              "-b:v", "4000k",
              "-maxrate", "4000k",
              "-bufsize", "8000k",
              "-pix_fmt", "yuv420p",
              "-g", "50",
              "-c:a", "aac",
              "-b:a", "128k",
              "-ar", "44100",
              "-f", "flv",
              rtmp_server
          ]

          print("🎥 Yayın başlatılıyor...")

          while True:
              proc = subprocess.Popen(command)
              proc.wait()
              print("⚠️ Yayın durdu. 5 saniye sonra yeniden başlatılıyor...")
              time.sleep(5)
          EOF

      - name: 🚀 Yayını başlat
        run: |
          python yayin.py
